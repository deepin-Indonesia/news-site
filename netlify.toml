# Netlify configuration — Preview deploy untuk news.deepin.id
# Production (main branch) menggunakan GitHub Pages, bukan Netlify

[build]
  command = "echo 'url: \"'$DEPLOY_PRIME_URL'\"' > _config_netlify.yml && bundle exec jekyll build --config _config.yml,_config_netlify.yml"
  publish = "_site"

[build.environment]
  JEKYLL_ENV = "production"
  RUBY_VERSION = "3.3"


